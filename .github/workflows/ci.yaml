name: Haskell CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    name: GHC ${{ matrix.ghc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.6.5', '9.8.2', '9.10.1']
        cabal: ['3.10']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Haskell (GHC and Cabal)
      id: setup-haskell
      uses: haskell-actions/setup@v2
      with:
        ghc-version: ${{ matrix.ghc }}
        cabal-version: ${{ matrix.cabal }}

    - name: Cache Cabal store and dist-newstyle
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.setup-haskell.outputs.cabal-store }}
          dist-newstyle
        key: ${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('allocators.cabal') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.ghc }}-

    - name: Update Cabal package list
      run: cabal update

    - name: Build project
      run: cabal build all --enable-tests --enable-benchmarks

    - name: Run tests
      run: cabal test all --enable-tests --test-show-details=direct

    - name: Build documentation (Haddock)
      run: cabal haddock --enable-documentation --haddock-all
